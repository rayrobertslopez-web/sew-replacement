<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d1b2a">
<title>Hoops 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1b2a;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    -webkit-user-select: none; user-select: none; touch-action: none;
    -webkit-tap-highlight-color: transparent; }
  #game { position: fixed; inset: 0; }
  canvas { display: block; }

  /* ---------- HUD ---------- */
  #hud { position: fixed; top: 0; left: 0; right: 0; display: flex;
    justify-content: space-between; align-items: flex-start; padding: 10px 12px;
    pointer-events: none; z-index: 10; opacity: 0; transition: opacity 0.4s; }
  #hud.show { opacity: 1; }
  .hud-box { background: rgba(13, 27, 42, 0.72); border: 1px solid rgba(255,255,255,0.14);
    border-radius: 12px; padding: 7px 14px; color: #fff; text-align: center;
    backdrop-filter: blur(6px); min-width: 86px; }
  .hud-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; }
  .hud-value { font-size: 25px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .hud-value.low { color: #ff5252; animation: pulse 0.5s infinite alternate; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.14); } }

  #pauseBtn { position: fixed; top: 74px; right: 12px; z-index: 11; width: 42px; height: 42px;
    border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); background: rgba(13,27,42,0.72);
    color: #fff; font-size: 17px; cursor: pointer; backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center; }
  #pauseBtn.show { display: flex; }

  #streak { position: fixed; top: 76px; left: 50%; transform: translateX(-50%);
    color: #ffd166; font-weight: 800; font-size: 15px; z-index: 10;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6); pointer-events: none; opacity: 0;
    transition: opacity 0.3s; }
  #streak.show { opacity: 1; }

  /* ---------- power meter ---------- */
  #meter { position: fixed; right: 14px; top: 50%; transform: translateY(-50%);
    width: 14px; height: min(38vh, 300px); border-radius: 8px; z-index: 10;
    background: rgba(13,27,42,0.65); border: 1px solid rgba(255,255,255,0.18);
    overflow: hidden; opacity: 0; transition: opacity 0.15s; pointer-events: none; }
  #meter.show { opacity: 1; }
  #meterZone { position: absolute; left: 0; right: 0; background: rgba(128, 224, 168, 0.28);
    border-top: 1px solid rgba(128,224,168,0.7); border-bottom: 1px solid rgba(128,224,168,0.7); }
  #meterFill { position: absolute; left: 0; right: 0; bottom: 0; height: 0%;
    background: linear-gradient(180deg, #ffd166, #f77f00); transition: height 0.03s linear; }
  #meterFill.hot { background: linear-gradient(180deg, #80e0a8, #3fb872); }

  /* ---------- popups ---------- */
  #popup { position: fixed; top: 32%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
    font-size: 50px; font-weight: 900; color: #ffd166; z-index: 20; opacity: 0;
    pointer-events: none; text-shadow: 0 4px 20px rgba(0,0,0,0.7);
    font-style: italic; letter-spacing: 1px; white-space: nowrap; }
  #popup.pop { animation: popIn 1s ease-out forwards; }
  @keyframes popIn {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
    20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    35%  { transform: translate(-50%, -50%) scale(1); }
    75%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -80%) scale(1); }
  }
  #missHint { position: fixed; top: 42%; left: 50%; transform: translate(-50%, -50%);
    font-size: 22px; font-weight: 700; color: #8d99ae; z-index: 19; opacity: 0;
    pointer-events: none; text-shadow: 0 2px 10px rgba(0,0,0,0.7); }
  #missHint.pop { animation: hintIn 0.9s ease-out forwards; }
  @keyframes hintIn {
    0% { opacity: 0; } 20% { opacity: 1; } 70% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -70%); }
  }

  #hint { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.88); font-size: 15px; z-index: 10; pointer-events: none;
    background: rgba(13,27,42,0.6); padding: 8px 18px; border-radius: 20px;
    backdrop-filter: blur(4px); transition: opacity 0.5s; white-space: nowrap; }
  #hint.hide { opacity: 0; }

  /* ---------- screens ---------- */
  .overlay { position: fixed; inset: 0; background: rgba(8, 15, 26, 0.85);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 30; backdrop-filter: blur(8px); transition: opacity 0.35s; overflow-y: auto; }
  .overlay.hide { opacity: 0; pointer-events: none; }
  .overlay h1 { color: #fff; font-size: clamp(40px, 10vw, 68px); font-weight: 900;
    font-style: italic; letter-spacing: 2px; }
  .overlay h1 .accent { color: #f77f00; }
  .overlay .tag { color: rgba(255,255,255,0.55); font-size: 13px; letter-spacing: 3px;
    text-transform: uppercase; margin: 2px 0 22px; }
  .overlay p { color: rgba(255,255,255,0.7); font-size: 14px; margin: 4px 24px; text-align: center; }

  .modes { display: flex; flex-direction: column; gap: 12px; width: min(340px, 86vw); }
  .mode { display: flex; align-items: center; gap: 14px; padding: 14px 18px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14);
    border-radius: 16px; cursor: pointer; color: #fff; text-align: left;
    transition: transform 0.12s, background 0.2s; }
  .mode:active { transform: scale(0.97); background: rgba(247,127,0,0.18); }
  .mode .ico { font-size: 30px; }
  .mode .t { font-size: 17px; font-weight: 800; }
  .mode .d { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 2px; }
  .mode .bst { margin-left: auto; text-align: right; font-size: 11px; color: #90e0ef;
    white-space: nowrap; }
  .mode .bst b { display: block; font-size: 18px; color: #ffd166; }

  #soundBtn { margin-top: 20px; background: none; border: 1px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.8); border-radius: 20px; padding: 8px 20px; font-size: 14px;
    cursor: pointer; }

  .bigscore { font-size: 62px; font-weight: 900; color: #ffd166; margin: 2px 0 8px; }
  .newbest { color: #80e0a8; font-weight: 800; font-size: 17px; margin-bottom: 6px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    width: min(340px, 86vw); margin: 10px 0 4px; }
  .stat { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 10px 6px; text-align: center; }
  .stat .l { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(255,255,255,0.5); }
  .stat .v { font-size: 22px; font-weight: 800; color: #fff; font-variant-numeric: tabular-nums; }

  .btnrow { display: flex; gap: 12px; margin-top: 20px; }
  .btn { padding: 13px 34px; font-size: 17px; font-weight: 800;
    color: #fff; background: linear-gradient(135deg, #f77f00, #d62828);
    border: none; border-radius: 30px; cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 6px 24px rgba(247, 127, 0, 0.4); transition: transform 0.15s; }
  .btn:active { transform: scale(0.94); }
  .btn.ghost { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.25);
    box-shadow: none; }
</style>
</head>
<body>
<div id="game"></div>

<div id="hud">
  <div class="hud-box"><div class="hud-label" id="hud1l">Score</div><div class="hud-value" id="hud1v">0</div></div>
  <div class="hud-box"><div class="hud-label" id="hud2l">Time</div><div class="hud-value" id="hud2v">60</div></div>
  <div class="hud-box"><div class="hud-label" id="hud3l">Best</div><div class="hud-value" id="hud3v">0</div></div>
</div>
<button id="pauseBtn" aria-label="Pause">⏸</button>
<div id="streak"></div>
<div id="meter"><div id="meterZone"></div><div id="meterFill"></div></div>
<div id="popup"></div>
<div id="missHint"></div>
<div id="hint">Swipe up to shoot 🏀</div>

<!-- main menu -->
<div class="overlay" id="menuScreen">
  <h1>HOOPS <span class="accent">3D</span></h1>
  <div class="tag">Pick your game</div>
  <div class="modes">
    <button class="mode" data-mode="arcade">
      <span class="ico">⏱️</span>
      <span><span class="t">Arcade</span><br><span class="d">60 seconds. Heat checks. Golden balls.</span></span>
      <span class="bst">best<b id="bestArcade">–</b></span>
    </button>
    <button class="mode" data-mode="atw">
      <span class="ico">🌍</span>
      <span><span class="t">Around the World</span><br><span class="d">Sink all 8 spots in as few shots as you can.</span></span>
      <span class="bst">best<b id="bestAtw">–</b></span>
    </button>
    <button class="mode" data-mode="practice">
      <span class="ico">🎯</span>
      <span><span class="t">Practice</span><br><span class="d">No clock. Build your longest streak.</span></span>
      <span class="bst">streak<b id="bestPractice">–</b></span>
    </button>
  </div>
  <button id="soundBtn">🔊 Sound on</button>
  <p style="margin-top:16px">Swipe up through the ball to shoot &middot; angle aims &middot; length is power.<br>
  Land the meter in the green zone. Deep shots score <b style="color:#ffd166">3</b>.</p>
</div>

<!-- pause -->
<div class="overlay hide" id="pauseScreen">
  <h1>PAUSED</h1>
  <div class="btnrow">
    <button class="btn" id="resumeBtn">RESUME</button>
    <button class="btn ghost" id="quitBtn">MENU</button>
  </div>
</div>

<!-- end of game -->
<div class="overlay hide" id="endScreen">
  <h1 id="endTitle">TIME<span class="accent">!</span></h1>
  <div class="bigscore" id="finalScore">0</div>
  <div class="newbest" id="newBest" style="display:none">🏆 NEW BEST!</div>
  <div class="stats">
    <div class="stat"><div class="l">Makes</div><div class="v" id="stMakes">0/0</div></div>
    <div class="stat"><div class="l">Accuracy</div><div class="v" id="stAcc">0%</div></div>
    <div class="stat"><div class="l">Top streak</div><div class="v" id="stStreak">0</div></div>
  </div>
  <div class="btnrow">
    <button class="btn" id="againBtn">PLAY AGAIN</button>
    <button class="btn ghost" id="menuBtn">MENU</button>
  </div>
</div>

<script src="three.min.js"></script>
<script>
'use strict';
/* ============================================================
   HOOPS 3D — arcade basketball
   y is up; the hoop faces the player, who shoots from +z.
   Units are meters. Rim at 3.05 m, rim radius 0.23 m.
   ============================================================ */

const RIM_HEIGHT = 3.05;
const RIM_RADIUS = 0.23;
const RIM_TUBE   = 0.018;
const BALL_R     = 0.121;
const BOARD_W = 1.8, BOARD_H = 1.05;
const G = -9.81;
function launchAngleFor(dist) {
  // steeper launch up close so the entry angle stays ~45deg and clears the front rim
  return THREE.MathUtils.degToRad(THREE.MathUtils.clamp(58 - 1.9 * (dist - 4.2), 50, 58));
}
const THREE_PT_DIST = 6.0;
const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;

const rimCenter = new THREE.Vector3(0, RIM_HEIGHT, -0.05);
const boardZ = rimCenter.z - RIM_RADIUS - 0.12;
const boardBottomY = 2.9, boardTopY = boardBottomY + BOARD_H;

// ---------- Renderer / scene ----------
const container = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1b2a);
scene.fog = new THREE.Fog(0x0d1b2a, 18, 42);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);

// ---------- Lights ----------
scene.add(new THREE.AmbientLight(0xbfd4ff, 0.55));
const key = new THREE.DirectionalLight(0xfff2df, 1.15);
key.position.set(-6, 12, 6);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left = -10; key.shadow.camera.right = 10;
key.shadow.camera.top = 12;  key.shadow.camera.bottom = -4;
key.shadow.camera.far = 40;
scene.add(key);
const rimLight = new THREE.PointLight(0xffe0b0, 0.5, 15);
rimLight.position.set(0, 5.5, 1.5);
scene.add(rimLight);

// ---------- Court ----------
function makeCourtTexture() {
  const c = document.createElement('canvas'); c.width = 1024; c.height = 1024;
  const x = c.getContext('2d');
  const g = x.createLinearGradient(0, 0, 1024, 1024);
  g.addColorStop(0, '#c8873f'); g.addColorStop(0.5, '#d99a4e'); g.addColorStop(1, '#c07f38');
  x.fillStyle = g; x.fillRect(0, 0, 1024, 1024);
  x.globalAlpha = 0.14;
  for (let i = 0; i < 26; i++) {
    x.fillStyle = i % 2 ? '#8a5a24' : '#e8b06a';
    x.fillRect(0, i * 40, 1024, 20);
  }
  x.globalAlpha = 1;
  const m = 1024 / 15; // px per meter; texture spans 15 m, hoop near top edge
  x.strokeStyle = '#ffffff'; x.lineWidth = 6; x.globalAlpha = 0.85;
  const hx = 512, hy = 3.2 * m;
  x.strokeRect(hx - 2.45 * m, hy - 1.2 * m, 4.9 * m, 5.8 * m);      // the key
  x.beginPath(); x.arc(hx, hy + 4.6 * m, 1.8 * m, 0, Math.PI * 2); x.stroke(); // FT circle
  x.beginPath(); x.arc(hx, hy, 6.75 * m, 0.12 * Math.PI, 0.88 * Math.PI); x.stroke(); // 3pt arc
  x.globalAlpha = 1;
  const t = new THREE.CanvasTexture(c);
  t.anisotropy = 8;
  return t;
}
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(15, 15),
  new THREE.MeshStandardMaterial({ map: makeCourtTexture(), roughness: 0.75, metalness: 0.05 })
);
floor.rotation.x = -Math.PI / 2;
floor.position.set(0, 0, 4.3);
floor.receiveShadow = true;
scene.add(floor);

const apron = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshStandardMaterial({ color: 0x14213d, roughness: 1 })
);
apron.rotation.x = -Math.PI / 2;
apron.position.y = -0.01;
scene.add(apron);

// crowd wall
function makeCrowdTexture() {
  const c = document.createElement('canvas'); c.width = 2048; c.height = 512;
  const x = c.getContext('2d');
  x.fillStyle = '#0a1220'; x.fillRect(0, 0, 2048, 512);
  const cols = ['#3a506b', '#5b6c8f', '#22334f', '#6e5a7e', '#4f6d7a', '#7a5c46'];
  let s = 7;
  const rnd = () => (s = (s * 16807) % 2147483647) / 2147483647;
  for (let ry = 0; ry < 26; ry++) for (let cx = 0; cx < 250; cx++) {
    x.fillStyle = cols[Math.floor(rnd() * cols.length)];
    x.globalAlpha = 0.5 + rnd() * 0.5;
    x.beginPath();
    x.arc(4 + cx * 8.2 + rnd() * 3, 12 + ry * 19 + rnd() * 4, 2.6 + rnd() * 1.4, 0, Math.PI * 2);
    x.fill();
  }
  x.globalAlpha = 1;
  x.fillStyle = 'rgba(5, 10, 20, 0.55)';
  for (let ry = 0; ry < 5; ry++) x.fillRect(0, 90 + ry * 95, 2048, 8);
  return new THREE.CanvasTexture(c);
}
const wall = new THREE.Mesh(
  new THREE.PlaneGeometry(46, 11),
  new THREE.MeshBasicMaterial({ map: makeCrowdTexture(), fog: true })
);
wall.position.set(0, 5.5, -9);
scene.add(wall);

// ---------- Jumbotron (live scoreboard on the back wall) ----------
const jumboCanvas = document.createElement('canvas');
jumboCanvas.width = 640; jumboCanvas.height = 224;
const jumboTex = new THREE.CanvasTexture(jumboCanvas);
const jumbo = new THREE.Mesh(
  new THREE.PlaneGeometry(6.4, 2.24),
  new THREE.MeshBasicMaterial({ map: jumboTex })
);
jumbo.position.set(0, 8.2, -8.9);
scene.add(jumbo);
const jumboFrame = new THREE.Mesh(
  new THREE.PlaneGeometry(6.7, 2.54),
  new THREE.MeshBasicMaterial({ color: 0x05080f })
);
jumboFrame.position.set(0, 8.2, -8.92);
scene.add(jumboFrame);
function drawJumbo(line1, big, line2) {
  const x = jumboCanvas.getContext('2d');
  x.fillStyle = '#060a12'; x.fillRect(0, 0, 640, 224);
  x.strokeStyle = '#1c2b45'; x.lineWidth = 6; x.strokeRect(4, 4, 632, 216);
  x.textAlign = 'center';
  x.fillStyle = '#5b8cc8'; x.font = '700 30px monospace';
  x.fillText(line1, 320, 52);
  x.fillStyle = '#ffb703'; x.font = '900 92px monospace';
  x.shadowColor = '#ff8800'; x.shadowBlur = 18;
  x.fillText(big, 320, 148);
  x.shadowBlur = 0;
  x.fillStyle = '#e0e6f0'; x.font = '700 34px monospace';
  x.fillText(line2, 320, 196);
  jumboTex.needsUpdate = true;
}
drawJumbo('HOOPS 3D', '🏀', 'PICK A MODE');

// ---------- Hoop assembly ----------
const hoop = new THREE.Group();
const poleMat = new THREE.MeshStandardMaterial({ color: 0x2b2d42, roughness: 0.5, metalness: 0.6 });
const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 3.9, 16), poleMat);
pole.position.set(0, 1.95, boardZ - 1.0);
pole.castShadow = true;
hoop.add(pole);
const arm = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 1.0), poleMat);
arm.position.set(0, 3.75, boardZ - 0.5);
arm.castShadow = true;
hoop.add(arm);

function makeBoardTexture() {
  const c = document.createElement('canvas'); c.width = 512; c.height = 300;
  const x = c.getContext('2d');
  x.fillStyle = 'rgba(228, 240, 252, 0.92)'; x.fillRect(0, 0, 512, 300);
  x.strokeStyle = '#d62828'; x.lineWidth = 10;
  x.strokeRect(6, 6, 500, 288);
  x.strokeStyle = '#e63946'; x.lineWidth = 8;
  x.strokeRect(512 / 2 - 84, 300 - 8 - 130, 168, 130);
  return new THREE.CanvasTexture(c);
}
const board = new THREE.Mesh(
  new THREE.BoxGeometry(BOARD_W, BOARD_H, 0.04),
  new THREE.MeshStandardMaterial({ map: makeBoardTexture(), roughness: 0.25, metalness: 0.1,
    transparent: true, opacity: 0.96 })
);
board.position.set(0, boardBottomY + BOARD_H / 2, boardZ);
board.castShadow = true;
hoop.add(board);

const rim = new THREE.Mesh(
  new THREE.TorusGeometry(RIM_RADIUS, RIM_TUBE, 12, 40),
  new THREE.MeshStandardMaterial({ color: 0xe85d04, roughness: 0.35, metalness: 0.7 })
);
rim.rotation.x = Math.PI / 2;
rim.position.copy(rimCenter);
rim.castShadow = true;
hoop.add(rim);
const bracket = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.05, 0.13), rim.material);
bracket.position.set(0, RIM_HEIGHT - 0.01, boardZ + 0.08);
hoop.add(bracket);

// net
const NET_SEGS = 12, NET_ROWS = 5, NET_DEPTH = 0.42;
const netGeom = new THREE.BufferGeometry();
{
  const pos = [];
  for (let i = 0; i < NET_SEGS; i++)
    for (let r = 0; r < NET_ROWS; r++) { pos.push(0,0,0, 0,0,0); pos.push(0,0,0, 0,0,0); }
  netGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pos.length), 3));
}
const net = new THREE.LineSegments(netGeom,
  new THREE.LineBasicMaterial({ color: 0xf5f5f5, transparent: true, opacity: 0.85 }));
hoop.add(net);
let netSway = 0;
function updateNet(time) {
  const p = net.geometry.attributes.position.array;
  let k = 0;
  for (let i = 0; i < NET_SEGS; i++) {
    const a0 = (i / NET_SEGS) * Math.PI * 2;
    const a1 = ((i + 0.5) / NET_SEGS) * Math.PI * 2;
    const a2 = ((i + 1) / NET_SEGS) * Math.PI * 2;
    for (let r = 0; r < NET_ROWS; r++) {
      const t0 = r / NET_ROWS, t1 = (r + 1) / NET_ROWS;
      const rad0 = RIM_RADIUS * (1 - 0.45 * t0);
      const rad1 = RIM_RADIUS * (1 - 0.45 * t1);
      const swirl = netSway * 0.05 * Math.sin(time * 14 + r * 1.7 + i);
      const y0 = RIM_HEIGHT - t0 * NET_DEPTH, y1 = RIM_HEIGHT - t1 * NET_DEPTH;
      const aa = r % 2 ? a1 : a0, bb = r % 2 ? a2 : a1;
      p[k++] = rimCenter.x + Math.cos(aa) * rad0 + swirl; p[k++] = y0; p[k++] = rimCenter.z + Math.sin(aa) * rad0;
      p[k++] = rimCenter.x + Math.cos(bb) * rad1 + swirl; p[k++] = y1; p[k++] = rimCenter.z + Math.sin(bb) * rad1;
      p[k++] = rimCenter.x + Math.cos(bb) * rad0 + swirl; p[k++] = y0; p[k++] = rimCenter.z + Math.sin(bb) * rad0;
      p[k++] = rimCenter.x + Math.cos(aa) * rad1 + swirl; p[k++] = y1; p[k++] = rimCenter.z + Math.sin(aa) * rad1;
    }
  }
  net.geometry.attributes.position.needsUpdate = true;
}
scene.add(hoop);

// ---------- Ball ----------
function makeBallTexture() {
  const c = document.createElement('canvas'); c.width = 512; c.height = 256;
  const x = c.getContext('2d');
  const g = x.createLinearGradient(0, 0, 0, 256);
  g.addColorStop(0, '#e8752a'); g.addColorStop(0.5, '#d96520'); g.addColorStop(1, '#c2551a');
  x.fillStyle = g; x.fillRect(0, 0, 512, 256);
  x.globalAlpha = 0.08;
  let s = 13;
  const rnd = () => (s = (s * 16807) % 2147483647) / 2147483647;
  for (let i = 0; i < 1400; i++) {
    x.fillStyle = rnd() > 0.5 ? '#000' : '#fff';
    x.fillRect(rnd() * 512, rnd() * 256, 2, 2);
  }

    if (state.atwIdx >= ATW_SPOTS.length) {
      showPopup('WORLD TOUR! 🌍', '#80e0a8');
      setTimeout(() => endGame(true), 900);
    } else {
      showPopup(swish ? 'SWISH! NEXT →' : 'NEXT SPOT →', '#90e0ef');
    }
  } else { // practice
    state.score = state.streak;
    showPopup(swish ? 'SWISH! ×' + state.streak : '×' + state.streak,
      state.streak >= 3 ? '#ff6b35' : '#90e0ef');
  }

  if (state.streak >= 2) {
    $streak.textContent = '🔥 streak ×' + state.streak;
    $streak.classList.add('show');
  }
  refreshHud();
}

function onMiss() {
  const wasStreak = state.streak >= 2;
  state.streak = 0;
  $streak.classList.remove('show');
  if (wasStreak) sfx('aww');
  // direction feedback from the flight's closest approach to the rim
  const mi = state.missInfo;
  if (mi) {
    if (mi.closest > 0.65) showMissHint('AIR BALL 😅');
    else if (mi.cross) {
      const fwd = new THREE.Vector3().subVectors(rimCenter, state.shotFromPos); fwd.y = 0; fwd.normalize();
      const right = new THREE.Vector3(-fwd.z, 0, fwd.x);
      const err = new THREE.Vector3().subVectors(mi.cross, rimCenter);
      const along = err.dot(fwd), side = err.dot(right);
      if (Math.abs(along) > Math.abs(side)) showMissHint(along < -0.05 ? 'SHORT — more power' : 'LONG — ease up');
      else showMissHint(side < 0 ? 'Just left' : 'Just right');
    } else showMissHint('SO CLOSE');
  }
  refreshHud();
}

// ---------- HUD ----------
function refreshHud() {
  if (state.mode === 'arcade') {
    $hud1l.textContent = 'Score'; $hud1v.textContent = state.score;
    $hud2l.textContent = 'Time';
    $hud3l.textContent = 'Best'; $hud3v.textContent = getBest('arcade');
  } else if (state.mode === 'atw') {
    $hud1l.textContent = 'Spot'; $hud1v.textContent = Math.min(state.atwIdx + 1, 8) + '/8';
    $hud2l.textContent = 'Shots'; $hud2v.textContent = state.attempts;
    const b = getBest('atw');
    $hud3l.textContent = 'Best'; $hud3v.textContent = b ? b : '–';
  } else {
    $hud1l.textContent = 'Streak'; $hud1v.textContent = state.streak;
    $hud2l.textContent = 'Makes'; $hud2v.textContent = state.makes;
    $hud3l.textContent = 'Best'; $hud3v.textContent = getBest('practice');
  }
  updateJumbo();
}
let lastJumbo = '';
function updateJumbo() {
  let l1, big, l2;
  if (state.screen === 'menu') { l1 = 'HOOPS 3D'; big = '🏀'; l2 = 'PICK A MODE'; }
  else if (state.mode === 'arcade') {
    l1 = 'ARCADE'; big = String(state.score);
    l2 = 'TIME ' + Math.max(0, Math.ceil(state.timeLeft));
  } else if (state.mode === 'atw') {
    l1 = 'AROUND THE WORLD'; big = Math.min(state.atwIdx + 1, 8) + '/8'; l2 = 'SHOTS ' + state.attempts;
  } else {
    l1 = 'PRACTICE'; big = '×' + state.streak; l2 = 'MAKES ' + state.makes;
  }
  const sig = l1 + big + l2;
  if (sig !== lastJumbo) { lastJumbo = sig; drawJumbo(l1, big, l2); }
}

// ---------- Physics ----------
const tmpV = new THREE.Vector3();
function stepPhysics(dt) {
  if (!state.flying) return;
  const p = ball.position, v = state.ballVel;

  v.y += G * dt;
  v.multiplyScalar(1 - 0.02 * dt);
  p.addScaledVector(v, dt);
  if (window.HOOPS && HOOPS.rec) HOOPS.rec.push([p.x, p.y, p.z]);

  ball.rotation.x += state.ballSpin.x * dt;
  ball.rotation.z += state.ballSpin.z * dt;

  // record closest approach to rim center (for miss feedback)
  if (state.missInfo) {
    const d3 = Math.hypot(p.x - rimCenter.x, p.y - RIM_HEIGHT, p.z - rimCenter.z);
    if (d3 < state.missInfo.closest) state.missInfo.closest = d3;
    if (!state.missInfo.cross && v.y < 0 && p.y <= RIM_HEIGHT && p.y > RIM_HEIGHT - 0.3)
      state.missInfo.cross = p.clone().setY(RIM_HEIGHT);
  }

  // backboard
  if (p.z < boardZ + BALL_R && p.z > boardZ - 0.15 && v.z < 0 &&
      p.y > boardBottomY - BALL_R && p.y < boardTopY + BALL_R &&
      Math.abs(p.x) < BOARD_W / 2 + BALL_R) {
    p.z = boardZ + BALL_R;
    v.z = -v.z * 0.62;
    v.x *= 0.85; v.y *= 0.85;
    shake = Math.max(shake, 0.02);
    sfx('rim');
    buzz(10);
  }

  // rim torus
  const dxz = Math.hypot(p.x - rimCenter.x, p.z - rimCenter.z);
  if (Math.abs(p.y - RIM_HEIGHT) < BALL_R + RIM_TUBE + 0.05 && dxz > 0.0001) {
    tmpV.set(
      rimCenter.x + (p.x - rimCenter.x) / dxz * RIM_RADIUS,
      RIM_HEIGHT,
      rimCenter.z + (p.z - rimCenter.z) / dxz * RIM_RADIUS
    );
    const d = p.distanceTo(tmpV);
    const minD = BALL_R + RIM_TUBE;
    if (d < minD && d > 0.0001) {
      const n = new THREE.Vector3().subVectors(p, tmpV).divideScalar(d);
      p.copy(tmpV).addScaledVector(n, minD + 0.001);
      const vn = v.dot(n);
      if (vn < 0) {
        v.addScaledVector(n, -vn * 1.55);
        v.multiplyScalar(0.94);
        state.touchedRim = true;
        shake = Math.max(shake, 0.03);
        sfx('rim');
        buzz(10);
      }
    }
  }

  // score: cross rim plane downward inside the ring
  if (p.y > RIM_HEIGHT) state.aboveRim = true;
  if (state.aboveRim && !state.scoredThisFlight && v.y < 0 &&
      p.y < RIM_HEIGHT && p.y > RIM_HEIGHT - 0.25 &&
      dxz < RIM_RADIUS - BALL_R * 0.35) {
    state.scoredThisFlight = true;
    onScore();
  }

  // floor
  if (p.y < BALL_R) {
    p.y = BALL_R;
    if (Math.abs(v.y) > 0.8) sfx('bounce');
    v.y = -v.y * 0.6;
    v.x *= 0.8; v.z *= 0.8;
    state.ballSpin.multiplyScalar(0.7);
    if (Math.abs(v.y) < 0.5) v.y = 0;
  }

  // end of flight
  const settled = p.y <= BALL_R + 0.001 && v.lengthSq() < 0.3;
  const gone = p.z < -8 || Math.abs(p.x) > 12 || p.z > 14;
  if (settled || gone) {
    state.resetTimer += dt;
    if (state.resetTimer > 0.35) endFlight();
  } else if (state.scoredThisFlight && p.y < 1.2) {
    state.resetTimer += dt;
    if (state.resetTimer > 0.5) endFlight();
  } else {
    state.resetTimer = 0;
  }
}
let physAcc = 0;
function endFlight() {
  const scored = state.scoredThisFlight;
  if (window.HOOPS) HOOPS.lastFlight = {
    scored,
    closest: state.missInfo ? state.missInfo.closest : null,
    cross: state.missInfo && state.missInfo.cross
      ? { x: state.missInfo.cross.x, z: state.missInfo.cross.z } : null,
  };
  if (!scored) onMiss();
  state.flying = false;
  if (state.screen !== 'playing') return;
  if (state.mode === 'arcade' && state.timeLeft <= 0) { endGame(false); return; }
  if (state.mode === 'atw' && state.atwIdx >= ATW_SPOTS.length) return; // endGame already queued
  if (scored) nextSpot();
  else placeBallAtSpot(false);
}

// ---------- Game flow ----------
function refreshMenuBests() {
  const a = getBest('arcade'), w = getBest('atw'), p = getBest('practice');
  $('bestArcade').textContent = a || '–';
  $('bestAtw').textContent = w ? w + ' shots' : '–';
  $('bestPractice').textContent = p ? '×' + p : '–';
}
function startGame(mode) {
  state.mode = mode;
  state.screen = 'playing';
  state.timeLeft = 60;
  state.elapsed = 0;
  state.score = 0;
  state.streak = 0;
  state.bestStreakRun = 0;
  state.makes = 0;
  state.attempts = 0;
  state.atwIdx = 0;
  state.spotIdx = 0;
  state.firstMakeDone = false;
  $hud2v.classList.remove('low');
  $hud2v.textContent = mode === 'arcade' ? '60' : '0';
  $streak.classList.remove('show');
  $hint.classList.remove('hide');
  $hud.classList.add('show');
  $pauseBtn.classList.add('show');
  $('menuScreen').classList.add('hide');
  $('endScreen').classList.add('hide');
  $('pauseScreen').classList.add('hide');
  placeBallAtSpot(true);
  refreshHud();
  sfx('click');
}
function endGame(won) {
  if (state.screen === 'over') return;
  state.screen = 'over';
  $pauseBtn.classList.remove('show');
  sfx(won ? 'cheer' : 'buzzer');

  let headline, final, isNewBest = false;
  if (state.mode === 'arcade') {
    headline = 'TIME<span class="accent">!</span>';
    final = state.score;
    if (state.score > getBest('arcade')) { setBest('arcade', state.score); isNewBest = state.score > 0; }
  } else if (state.mode === 'atw') {
    headline = won ? 'WORLD TOUR<span class="accent">!</span>' : 'TOUR OVER';
    final = state.attempts + ' shots';
    const b = getBest('atw');
    if (won && (b === 0 || state.attempts < b)) { setBest('atw', state.attempts); isNewBest = true; }
  } else {
    headline = 'NICE WORK';
    final = '×' + state.bestStreakRun;
    if (state.bestStreakRun > getBest('practice')) { setBest('practice', state.bestStreakRun); isNewBest = state.bestStreakRun > 0; }
  }
  if (isNewBest || won) { burstConfetti(); }
  $('endTitle').innerHTML = headline;
  $('finalScore').textContent = final;
  $('newBest').style.display = isNewBest ? '' : 'none';
  $('stMakes').textContent = state.makes + '/' + state.attempts;
  $('stAcc').textContent = (state.attempts ? Math.round(100 * state.makes / state.attempts) : 0) + '%';
  $('stStreak').textContent = '×' + state.bestStreakRun;
  $('endScreen').classList.remove('hide');
  refreshMenuBests();
  refreshHud();
}
function goMenu() {
  state.screen = 'menu';
  $('menuScreen').classList.remove('hide');
  $('endScreen').classList.add('hide');
  $('pauseScreen').classList.add('hide');
  $hud.classList.remove('show');
  $pauseBtn.classList.remove('show');
  $meter.classList.remove('show');
  state.flying = false;
  state.spotIdx = 0; state.atwIdx = 0;
  placeBallAtSpot(false);
  refreshMenuBests();
  updateJumbo();
}
function pauseGame() {
  if (state.screen !== 'playing') return;
  state.screen = 'paused';
  $('pauseScreen').classList.remove('hide');
  sfx('click');
}
function resumeGame() {
  if (state.screen !== 'paused') return;
  state.screen = 'playing';
  $('pauseScreen').classList.add('hide');
  sfx('click');
}

document.querySelectorAll('.mode').forEach(b =>
  b.addEventListener('click', () => startGame(b.dataset.mode)));
$('againBtn').addEventListener('click', () => startGame(state.mode));
$('menuBtn').addEventListener('click', goMenu);
$pauseBtn.addEventListener('click', pauseGame);
$('resumeBtn').addEventListener('click', resumeGame);
$('quitBtn').addEventListener('click', goMenu);
function syncSoundBtn() { $('soundBtn').textContent = soundOn ? '🔊 Sound on' : '🔇 Sound off'; }
$('soundBtn').addEventListener('click', () => {
  soundOn = !soundOn;
  localStorage.setItem('hoops3d_sound', soundOn ? '1' : '0');
  syncSoundBtn();
  if (soundOn) sfx('click');
});
syncSoundBtn();
document.addEventListener('visibilitychange', () => { if (document.hidden) pauseGame(); });

// ---------- Main loop ----------
refreshMenuBests();
placeBallAtSpot(false);
updateCamera(true);
let lastTimerWhole = 60;
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.033);
  const t = clock.elapsedTime;

  if (state.screen === 'playing') {
    state.elapsed += dt;
    if (state.mode === 'arcade') {
      state.timeLeft -= dt;
      const whole = Math.max(0, Math.ceil(state.timeLeft));
      if (whole !== lastTimerWhole) {
        lastTimerWhole = whole;
        $hud2v.textContent = whole;
        if (whole <= 10) $hud2v.classList.add('low'); else $hud2v.classList.remove('low');
        updateJumbo();
      }
      // buzzer: let a ball already in the air finish its flight
      if (state.timeLeft <= 0 && !state.flying) endGame(false);
      if (state.timeLeft < -8) endGame(false);
    }
  }
  // fixed-timestep physics: identical trajectories at any frame rate.
  // runs on the 'over' screen too, so a ball still in the air can finish its flight
  if (state.screen === 'playing' || (state.screen === 'over' && state.flying)) {
    physAcc = Math.min(physAcc + dt, 0.1);
    while (physAcc >= PHYS_DT) { stepPhysics(PHYS_DT); physAcc -= PHYS_DT; }

    if (state.flying) {
      trailPts.unshift(ball.position.clone());
      if (trailPts.length > TRAIL_N) trailPts.pop();
      updateTrail();
      if (state.streak >= 3) { spawnFire(ball.position.x, ball.position.y, ball.position.z); }
    } else {
      if (trailPts.length) { trailPts.pop(); updateTrail(); }
    }
  }

  // ball pop-in + idle bob
  if (state.spawnScale < 1) {
    state.spawnScale = Math.min(1, state.spawnScale + dt * 5);
    const s = 0.4 + 0.6 * state.spawnScale;
    ball.scale.setScalar(s * (1 + 0.15 * Math.sin(state.spawnScale * Math.PI)));
  } else ball.scale.setScalar(1);
  if (!state.flying && (state.screen === 'playing' || state.screen === 'menu')) {
    ball.position.y = state.shotPos.y + Math.sin(t * 2.2) * 0.02;
    ball.rotation.y += dt * 0.4;
  }
  spotRing.scale.setScalar(1 + 0.08 * Math.sin(t * 3));
  spotRing.visible = !state.flying && state.screen === 'playing';

  shake = Math.max(0, shake - dt * 0.12);
  netSway = Math.max(0, netSway - dt * 1.4);
  updateNet(t);
  updateFire(dt);
  updateConfetti(dt, t);
  updateCamera(false);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// tiny test hook (also handy from the console)
window.HOOPS = {
  state,
  start: startGame,
  shoot(power = 1, lateralMps = 0) {
    if (state.screen !== 'playing' || state.flying) return false;
    const toHoop = new THREE.Vector3().subVectors(rimCenter, state.shotPos);
    const dist = Math.hypot(toHoop.x, toHoop.z);
    const fwd = new THREE.Vector3(toHoop.x, 0, toHoop.z).normalize();
    const right = new THREE.Vector3(-fwd.z, 0, fwd.x);
    const ang = launchAngleFor(dist);
    // same power->speed mapping (incl. aim assist) as a real swipe
    if (power > 0.9 && power < 1.1) power = 1 + (power - 1) * 0.35;
    const speed = idealSpeedFor(dist, RIM_HEIGHT - state.shotPos.y) * (0.55 + 0.45 * power);
    const v = new THREE.Vector3()
      .addScaledVector(fwd, speed * Math.cos(ang))
      .addScaledVector(right, lateralMps);
    v.y = speed * Math.sin(ang);
    launch(v);
    return true;
  },
};
</script>
</body>
